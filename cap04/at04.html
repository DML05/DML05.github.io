<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <title>
        Recursos Multimídia — Cap. 4 / Ativ. 4
    </title>
</head>

<body>

    <header>
        <h1>
            Recursos Multimídia
        </h1>
    </header>

    <main>

        <figure>

            <video
                controls
                width="800"
                height="450"
                poster="poster-aula.jpg"
                preload="metadata"
            >

                <source src="video/aula-html.mp4" type="video/mp4">

                <source src="video/aula-html.webm" type="video/webm">

                <track
                    src="legendas/aula-html.vtt"
                    kind="subtitles"
                    srclang="pt"
                    label="Português"
                    default
                >

                <p>
                    Seu navegador não suporta vídeo.
                    <a href="video/aula-html.mp4">
                        Baixar vídeo
                    </a>
                </p>

            </video>

            <figcaption>
                Aula introdutória sobre HTML5.
            </figcaption>

        </figure>

        <figure>

            <audio controls preload="metadata">

                <source src="audio/podcast.mp3" type="audio/mpeg">

                <source src="audio/podcast.ogg" type="audio/ogg">

                <p>
                    Seu navegador não suporta áudio.
                    <a href="audio/podcast.mp3">
                        Baixar áudio
                    </a>
                </p>

            </audio>

            <figcaption>
                Podcast sobre desenvolvimento web.
                <a href="transcricao.html">
                    Ver transcrição
                </a>
            </figcaption>

        </figure>

        <figure>

            <iframe
                width="800"
                height="450"
                src="https://www.youtube-nocookie.com/embed/IHrZgTRVk_M"
                title="Curso de HTML5 para iniciantes"
                loading="lazy"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen
            >
            </iframe>

            <figcaption>
                Vídeo educacional do YouTube sobre HTML5.
            </figcaption>

        </figure>

        <figure>

            <picture>

                <source
                    media="(min-width: 768px)"
                    srcset="img/banner-wide.jpg"
                >

                <img
                    src="img/banner-mobile.jpg"
                    alt="Banner sobre desenvolvimento web"
                    width="800"
                    height="400"
                >

            </picture>

            <figcaption>
                Banner ilustrativo sobre tecnologias web.
            </figcaption>

        </figure>

    </main>

    <footer>

        <p>
            Desenvolvido por Daniel Moura
        </p>

        <p>
            Curso Técnico Integrado em Informática
        </p>

        <p>
            2026
        </p>

    </footer>

    <p>
        <a href="../index.html">
            ← Voltar à página principal
        </a>
    </p>

</body>

</html>
